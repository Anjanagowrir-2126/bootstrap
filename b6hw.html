<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
        .container{
            border:2px solid black;
            background-color:rgba(165, 106, 42, 0.501);
            width: 500px;
            margin: 50px auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px;
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            text-align: center;
        }
        h2{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-10">
        <form>
            <h1>Cookies & Cream</h1>
        <h2>Feedback</h2>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" class="form-control" id="name" placeholder="Enter Your Name">
        </div>
        <div class="form-group">
            <label for="Email">Email:</label>
            <input type="email" class="form-control" id="email" placeholder="Enter Your Email">
        </div> 
        <div class="form-group">
            <label for="Message">Feedback:</label>
            <textarea class="form-control" rows="3" id="message" placeholder="Enter Your Feedback"></textarea>
        </div>
       <label class="mt-3">Preferred Contact Method</label>

<div class="form-check">
    <input class="form-check-input" type="radio" name="contact" id="emailContact">
    <label class="form-check-label" for="emailContact">
        Email
    </label>
</div>

<div class="form-check">
    <input class="form-check-input" type="radio" name="contact" id="phoneContact">
    <label class="form-check-label" for="phoneContact">
        Phone
    </label>
</div>
        </div>
        <div class="d-flex-wrap">
        <label class="mt-3"><strong>Satisfaction Level (0-10)</strong></label>
        <div class="form-check"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">1
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">2
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">3
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">4
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">5
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">6
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">7
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">8
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">9
         </label>
        </div>
        <div class="form-check me-4"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">10
         </label>
         </div>
        </div>
        </div>
            <div class="form-group">
            <label for="dd">Choose Type of Order</label>
                <select class="form-control" id="dd">
                    <option selected disabled>choose from option</option>
                    <option>Cake</option>
                    <option>Cookies</option>
                    <option>Pastries</option>
                </select>
        </div>
        <div>
             
        <button type="submit" class="btn btn-outline-success w-100 mb-3 mt-3">Submit
        </button>
        </form>
    </div>
    </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>

</body>
</html>
