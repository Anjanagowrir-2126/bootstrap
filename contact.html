<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: url("zomato.jpeg") center/cover no-repeat fixed;
    min-height: 100vh;
}

/* Dark overlay for readability */
.overlay{
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    color: white;
}

/* Header */
header{
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Buttons */
button{
    background-color: green;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    margin-right: 10px;
}

button:hover{
    background-color: darkgreen;
}

/* Box styling */
.box{
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 10px;
}

/* Footer */
footer{
    text-align: center;
    padding: 15px;
    margin-top: 20px;
    background: rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="overlay">

    <!-- Header -->
    <header>
        <h1>Zomato</h1>
        <div>
            <button onclick="window.location.href='home.html'">Home</button>
            <button onclick="window.location.href='contact.html'">Contact</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row align-items-center">

            <!-- Left Side -->
            <div class="col-lg-8 col-12">
                <div class="box">
                    <h2>Welcome to Zomato</h2>
                    <p>
                        Discover the best food & drinks around you.
                        Order from your favourite restaurants and enjoy fast delivery at your doorstep.
                    </p>
                </div>
            </div>

            <!-- Right Side -->
            <div class="col-lg-4 col-12 text-center mt-3 mt-lg-0">
                <div class="box">
                    <img src="food.jpg" class="img-fluid rounded" alt="Food">
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer>
        &copy; 2026 Zomato. All Rights Reserved.
    </footer>

</div>

</body>
</html>
