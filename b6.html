<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
        .container{
            border:2px solid black;
            background-color:darkseagreen;
            width: 500px;
            margin: 50px auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px;
            font-family: Arial, Helvetica, sans-serif;
        }
        h2{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-10">
        <form>
        <h2>Feedback</h2>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" class="form-control" id="name" placeholder="Enter Your Name">
        </div>
        <div class="form-group">
            <label for="Email">Email:</label>
            <input type="email" class="form-control" id="email" placeholder="Enter Your Email">
        </div>
        <div class="form-group">
            <label for="Message">Feedback:</label>
            <textarea class="form-control" rows="3" id="message" placeholder="Enter Your Feedback"></textarea>
        </div>
            <div class="form-group">
            <label for="dd">How did you find this website?</label>
                <select class="form-control" id="dd">
                    <option selected disabled>Select an option</option>
                    <option>Google Search</option>
                    <option>Social Media</option>
                    <option>Friend or Family</option>
                    <option>Youtube</option>
                    <option>Other</option>
                </select>
        </div>
        <div>
             <label class="mt-3">please rate our website:</label>
        
        <div class="form-check"> 
           
        
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">1
         </label>
        </div>
        <div class="form-check"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">2
         </label>
        </div>
        <div class="form-check"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">3
         </label>
        </div>
        <div class="form-check"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">4
         </label>
        </div>
        <div class="form-check"> 
         <label class="form-check-label">
            <input type="radio" class="form-check-input" name="opt">5
         </label>
        </div>
        </div>
        <button type="submit" class="btn btn-outline-success mb-3">Submit
        </button>
        </form>
    </div>
    </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>

</body>
</html>
